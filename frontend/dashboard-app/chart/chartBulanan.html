<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Tree View Dashboard</h1>

        <!-- Section 1: Revenue Trend -->
        <div class="card">
            <div class="control-bar">
                <div class="card-title">Monthly Revenue Comparison (2024 vs 2025)</div>
                
                <div class="control-actions">
                    <div class="bu-filter-container">
                        <label class="input-group-label">Business Unit:</label>
                        <div class="bu-filter-cards">
                            <div class="bu-filter-card" id="bu_gosave" onclick="toggleBusinessUnit('Gosave')">
                                <div class="bu-checkbox">
                                    <div class="bu-checkbox-inner"></div>
                                </div>
                                <span>Gosave</span>
                            </div>
                            <div class="bu-filter-card" id="bu_goto" onclick="toggleBusinessUnit('Goto')">
                                <div class="bu-checkbox">
                                    <div class="bu-checkbox-inner"></div>
                                </div>
                                <span>Goto</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label class="input-group-label">Account:</label>
                        <input type="text" id="account_header" value="4000.01.00" class="input-group-input">
                    </div>
                    
                    <div class="month-picker-container" id="month_picker_container">
                        <button class="btn" id="month_picker_btn" onclick="toggleMonthPicker()">
                            <span>📅</span>
                            <span id="month_picker_label">Pilih Bulan</span>
                            <span>▼</span>
                        </button>
                        <div class="month-picker-dropdown" id="month_picker_dropdown">
                            <div class="month-picker-header">
                                <span>Pilih Periode</span>
                                <button class="month-picker-close" onclick="closeMonthPicker()">✕</button>
                            </div>
                            <div class="month-picker-body" id="month_picker_body">
                                <!-- Will be populated by JS -->
                            </div>
                            <div class="month-picker-footer">
                                <button class="btn" onclick="cancelMonthPicker()">Batal</button>
                                <button class="btn btn-primary" onclick="applyMonthPicker()">Terapkan</button>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="loadRevenue()" id="load_revenue_btn">
                        <span>🔄</span>
                        Load Data
                    </button>
                </div>
            </div>
            
            <div class="card-body">
                <div class="legend-toggles">
                    <div class="legend-item" id="legend_credit" onclick="toggleLegendCredit()">
                        <div class="legend-indicator legend-indicator-credit"></div>
                        <span class="legend-label">Credit</span>
                    </div>
                    <div class="legend-item" id="legend_debit" onclick="toggleLegendDebit()">
                        <div class="legend-indicator legend-indicator-debit"></div>
                        <span class="legend-label">Debit</span>
                    </div>
                    <div class="legend-item" id="legend_total" onclick="toggleLegendTotal()">
                        <div class="legend-indicator legend-indicator-total"></div>
                        <span class="legend-label">Total (Credit - Debit)</span>
                    </div>
                </div>
                
                <div class="chart-area">
                    <div class="loading-overlay" id="loading_overlay" style="display: none;">
                        <div class="spinner"></div>
                    </div>
                    <canvas id="revenue_chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Section 2: Invoice Sales (REVISED) -->
        <div class="section">
            <h2>📊 Invoice Sales & Quantity Analysis</h2>
            
            <!-- Business Unit Filter (Multi-Select) -->
            <div class="form-group">
                <label>Business Unit (Multi-Select):</label>
                <div class="button-group">
                    <button class="filter-btn" data-unit="Gosave" onclick="toggleBusinessUnit('Gosave')">Gosave</button>
                    <button class="filter-btn" data-unit="Goto" onclick="toggleBusinessUnit('Goto')">Goto</button>
                </div>
            </div>
            
            <!-- Date Filter Type -->
            <div class="form-group">
                <label>Tipe Filter Tanggal:</label>
                <select id="date_filter_type" onchange="toggleDateFilter()">
                    <option value="year">Per Tahun (Bulanan)</option>
                    <option value="range">Range Tanggal</option>
                    <option value="specific">Tanggal Tertentu (Max 30)</option>
                    <option value="compare_year">Compare by Year</option>
                </select>
            </div>
            
            <!-- Year Filter (only for type=year) -->
            <div class="form-group" id="year_filter_container">
                <label>Pilih Tahun (Multi-Select):</label>
                <div class="button-group" id="year_buttons">
                    <!-- Will be populated by JS -->
                </div>
            </div>
            
            <!-- Date Range Filter (only for type=range) -->
            <div class="form-group" id="range_filter_container" style="display:none;">
                <label>Range Tanggal:</label>
                <input type="date" id="range_start_date">
                <span>sampai</span>
                <input type="date" id="range_end_date">
            </div>
            
            <!-- Specific Dates Filter (only for type=specific) -->
            <div class="form-group" id="specific_date_container" style="display:none;">
                <label>Tanggal Tertentu (Max 30):</label>
                <input type="date" id="add_date_input">
                <button onclick="addSpecificDate()">Tambah</button>
                <div id="selected_dates" class="tag-container"></div>
            </div>

            <div class="form-group" id="compare_year_container" style="display:none;">
                <label>Pilih Tanggal & Bulan:</label>
                <input type="date" id="compare_date_input">
                <button onclick="addCompareDate()">Tambah</button>
                <div id="compare_dates_selected" class="tag-container"></div>
                
                <div id="compare_year_selector" style="display:none; margin-top:15px;">
                    <label>Pilih Tahun untuk Perbandingan:</label>
                    <div class="button-group" id="compare_year_buttons">
                        <!-- Will be populated by JS -->
                    </div>
                </div>
            </div>
            
            
            <button onclick="loadInvoiceSales()" class="btn-primary">Load Data</button>
            <span id="invoice_loading">⏳ Loading...</span>
            
            <div class="chart-container-single">
                <canvas id="invoice_combined_chart"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
