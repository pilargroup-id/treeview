<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Tree View Dashboard</h1>

        <div class="section">
            <h2>Revenue Trend (Credit - Debit)</h2>
            <div class="form-group">
                <label>Account Header: 
                    <input type="text" id="account_header" value="4000.01.00">
                </label>
                <label>Start Date: 
                    <input type="date" id="start_date" value="2024-01-01">
                </label>
                <label>End Date: 
                    <input type="date" id="end_date" value="2025-12-31">
                </label>
                <button onclick="loadRevenue()">Load Data</button>
                <span id="loading">⏳ Loading...</span>
            </div>
            
            <canvas id="revenue_chart"></canvas>
            
            <div id="data_table"></div>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
