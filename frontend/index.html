<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Tree View Dashboard</h1>

        <!-- Section 1: Revenue Trend -->
        <div class="section">
            <h2>Revenue Trend (Credit - Debit)</h2>
            
            <!-- Business Unit Filter -->
            <div class="form-group">
                <label>Business Unit (Optional - Multi-Select):</label>
                <div class="button-group">
                    <button class="filter-btn" data-unit-revenue="Gosave" onclick="toggleRevenueBusinessUnit('Gosave')">Gosave</button>
                    <button class="filter-btn" data-unit-revenue="Goto" onclick="toggleRevenueBusinessUnit('Goto')">Goto</button>
                </div>
                <small style="color:#666; display:block; margin-top:5px;">*Kosongkan untuk tampilkan semua</small>
            </div>
            
            <div class="form-group">
                <label>Account Header: 
                    <input type="text" id="account_header" value="4000.01.00">
                </label>
                <label>Start Date: 
                    <input type="date" id="start_date" value="2024-01-01">
                </label>
                <label>End Date: 
                    <input type="date" id="end_date" value="2025-12-31">
                </label>
                <button onclick="loadRevenue()">Load Data</button>
                <span id="loading">⏳ Loading...</span>
            </div>
            
            <canvas id="revenue_chart"></canvas>
        </div>

        <!-- Section 2: Invoice Sales (REVISED) -->
        <div class="section">
            <h2>📊 Invoice Sales & Quantity Analysis</h2>
            
            <!-- Business Unit Filter (Multi-Select) -->
            <div class="form-group">
                <label>Business Unit (Multi-Select):</label>
                <div class="button-group">
                    <button class="filter-btn" data-unit="Gosave" onclick="toggleBusinessUnit('Gosave')">Gosave</button>
                    <button class="filter-btn" data-unit="Goto" onclick="toggleBusinessUnit('Goto')">Goto</button>
                </div>
            </div>
            
            <!-- Date Filter Type -->
            <div class="form-group">
                <label>Tipe Filter Tanggal:</label>
                <select id="date_filter_type" onchange="toggleDateFilter()">
                    <option value="year">Per Tahun (Bulanan)</option>
                    <option value="range">Range Tanggal</option>
                    <option value="specific">Tanggal Tertentu (Max 30)</option>
                    <option value="compare_year">Compare by Year</option>
                    <option value="multi_range">Multi Range Comparison (Max 5)</option>
                </select>
            </div>
            
            <!-- Year Filter (only for type=year) -->
            <div class="form-group" id="year_filter_container">
                <label>Pilih Tahun (Multi-Select):</label>
                <div class="button-group" id="year_buttons">
                    <!-- Will be populated by JS -->
                </div>
            </div>
            
            <!-- Date Range Filter (only for type=range) -->
            <div class="form-group" id="range_filter_container" style="display:none;">
                <label>Range Tanggal:</label>
                <input type="date" id="range_start_date">
                <span>sampai</span>
                <input type="date" id="range_end_date">
            </div>
            
            <!-- Specific Dates Filter (only for type=specific) -->
            <div class="form-group" id="specific_date_container" style="display:none;">
                <label>Tanggal Tertentu (Max 30):</label>
                <input type="date" id="add_date_input">
                <button onclick="addSpecificDate()">Tambah</button>
                <div id="selected_dates" class="tag-container"></div>
            </div>

            <div class="form-group" id="compare_year_container" style="display:none;">
                <label>Pilih Tanggal & Bulan:</label>
                <input type="date" id="compare_date_input">
                <button onclick="addCompareDate()">Tambah</button>
                <div id="compare_dates_selected" class="tag-container"></div>
                
                <div id="compare_year_selector" style="display:none; margin-top:15px;">
                    <label>Pilih Tahun untuk Perbandingan:</label>
                    <div class="button-group" id="compare_year_buttons">
                        <!-- Will be populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Multi Range Comparison Filter (NEW) -->
            <div class="form-group" id="multi_range_container" style="display:none;">
                <label>Range Tanggal untuk Perbandingan (Max 5 Range, 31 Hari per Range):</label>
                
                <div id="range_inputs_container">
                    <!-- Range 1 -->
                    <div class="range-input-group" data-range-index="0">
                        <span class="range-label">Range 1:</span>
                        <input type="date" class="range-start" placeholder="Tanggal Mulai">
                        <span>sampai</span>
                        <input type="date" class="range-end" placeholder="Tanggal Akhir">
                        <button class="btn-small" onclick="validateRange(0)">✓ Validasi</button>
                        <span class="range-status"></span>
                    </div>
                </div>
                
                <button onclick="addRangeInput()" id="add_range_btn" style="margin-top:10px;">+ Tambah Range</button>
                <div id="validated_ranges" class="tag-container" style="margin-top:15px;"></div>
            </div>
            
            
            <button onclick="loadInvoiceSales()" class="btn-primary">Load Data</button>
            <span id="invoice_loading">⏳ Loading...</span>
            
            <div class="chart-container-single">
                <canvas id="invoice_combined_chart"></canvas>
            </div>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
