<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Tree View Logo</title>
  <desc id="desc">A node graph icon that represents a tree structure.</desc>
  <defs>
    <linearGradient id="line" x1="112" y1="112" x2="400" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#89B7DC" />
      <stop offset="1" stop-color="#5A9FD0" />
    </linearGradient>
  </defs>

  <!-- Halo stroke keeps logo visible on both light and dark backgrounds -->
  <g stroke="#0F172A" stroke-opacity="0.24" stroke-width="30" stroke-linecap="round" fill="none">
    <path d="M256 140L170 250" />
    <path d="M256 140L342 250" />
    <path d="M170 250L112 340" />
    <path d="M170 250L228 340" />
    <path d="M342 250L284 340" />
    <path d="M342 250L400 340" />
  </g>
  <g stroke="url(#line)" stroke-width="18" stroke-linecap="round" fill="none">
    <path d="M256 140L170 250" />
    <path d="M256 140L342 250" />
    <path d="M170 250L112 340" />
    <path d="M170 250L228 340" />
    <path d="M342 250L284 340" />
    <path d="M342 250L400 340" />
  </g>

  <g stroke="#0F172A" stroke-opacity="0.3" stroke-width="12">
    <circle cx="256" cy="112" r="30" fill="#5A9FD0" />
    <circle cx="170" cy="250" r="27" fill="#6BA3D0" />
    <circle cx="342" cy="250" r="27" fill="#6BA3D0" />
    <circle cx="112" cy="340" r="24" fill="#F8FAFC" />
    <circle cx="228" cy="340" r="24" fill="#F8FAFC" />
    <circle cx="284" cy="340" r="24" fill="#F8FAFC" />
    <circle cx="400" cy="340" r="24" fill="#F8FAFC" />
  </g>
  <g stroke="#E8F1F8" stroke-width="8">
    <circle cx="256" cy="112" r="30" fill="#5A9FD0" />
    <circle cx="170" cy="250" r="27" fill="#6BA3D0" />
    <circle cx="342" cy="250" r="27" fill="#6BA3D0" />
  </g>
  <g stroke="#89B7DC" stroke-width="7">
    <circle cx="112" cy="340" r="24" fill="#F8FAFC" />
    <circle cx="228" cy="340" r="24" fill="#F8FAFC" />
    <circle cx="284" cy="340" r="24" fill="#F8FAFC" />
    <circle cx="400" cy="340" r="24" fill="#F8FAFC" />
  </g>
</svg>
